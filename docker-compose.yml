services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: localnow
      MYSQL_USER: ${MYSQL_USER:-localnow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-localnow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    # 호스트(맥) 포트: 로컬 MySQL이 3306을 쓰면 3307 등으로 겹치지 않게 조정. 오른쪽 3306은 컨테이너 내부.
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
