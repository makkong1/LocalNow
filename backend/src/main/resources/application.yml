spring:
  config:
    import: "optional:classpath:application-local.yml"
  datasource:
    # docker-compose MySQL 은 호스트에서 3307 로 노출(로컬 MySQL 과 3306 충돌 방지). 로컬 전용 DB 는 DB_URL 로 3306 등 지정.
    url: ${DB_URL:jdbc:mysql://localhost:3307/localnow?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:localnow}
    password: ${DB_PASSWORD:localnow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      client:
        registration:
          google:
            # client-id / client-secret 은 application-local.yml (gitignored) 에서 주입
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            # Google OIDC, redirect: {baseUrl}/login/oauth2/code/{registrationId}
          github:
            # 비어 있으면 Spring 이 OAuth2 클라이언트 빈 생성에 실패한다. 실제 값은 env / application-local에서 덮어쓴다.
            client-id: ${GITHUB_CLIENT_ID:github-not-configured}
            client-secret: ${GITHUB_CLIENT_SECRET:github-not-configured}
            scope: read:user,user:email
            # redirect: {baseUrl}/login/oauth2/code/github (GitHub OAuth App 에 동일 URI 등록)

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-in-production}
  expiry-seconds: 86400

server:
  # Metro 기본(8081)과 겹치지 않게 8080. OAuth 앱 redirect URI 도 동일 포트로 맞출 것.
  port: 8080

# Google OAuth2 완료 후 프론트(웹/뷰)가 토큰·오류를 받는 URL. fragment(#)에 access_token 을 둔다(성공 핸들러).
# http-access-log: 요청 한 줄(메서드/URI/상태/소요ms). false 또는 HTTP_ACCESS_LOG=false 로 끄기
app:
  http-access-log: ${HTTP_ACCESS_LOG:true}
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/oauth/callback}
    # 앱에서 ?mobile=1 로 OAuth 시작 시 Safari 가 이 스킴으로 돌아온다(토큰은 fragment).
    success-redirect-mobile: ${OAUTH2_SUCCESS_REDIRECT_MOBILE:localnow://oauth/callback}
    failure-redirect: ${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:3000/oauth/callback?error=1}
    failure-redirect-mobile: ${OAUTH2_FAILURE_REDIRECT_MOBILE:localnow://oauth/callback?error=1}
  match:
    # POST /requests/{id}/confirm Redis NX lock TTL. 운영에서는 P99 확정 트랜잭션+여유만큼 늘리고, 0/음수는 기동 실패.
    confirm-lock-ttl: ${MATCH_CONFIRM_LOCK_TTL:5s}

# 콘솔 로그에 MDC: 요청ID·서비스 operation (JPA SQL 등 동일 스레드 로그와 상관)
# 프로덕션에선 root/com.localnow/SQL 등 를 INFO로 내리거나 spring.profiles 로 분리하는 것이 좋다.

logging:
  level:
    root: INFO
    com.localnow: DEBUG
    com.localnow.http: INFO
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.security: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.amqp: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging.simp: DEBUG
    org.hibernate.SQL: DEBUG
    # Hibernate 6 — 바인딩 파라미터(매우 다수)
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{ISO8601} %5p [%t] [%X{requestId:-}][%X{operation:-}] %logger{40} - %m%n%wEx"

management:
  endpoints:
    web:
      exposure:
        include: health,info
