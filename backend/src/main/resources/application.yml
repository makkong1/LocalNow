spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/localnow?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:localnow}
    password: ${DB_PASSWORD:localnow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-in-production}
  expiry-seconds: 86400

server:
  port: 8081

# 콘솔 로그에 MDC: 요청ID·서비스 operation (JPA SQL 등 동일 스레드 로그와 상관)
logging:
  level:
  org.hibernate.SQL: TRACE
  org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{ISO8601} %5p [%X{requestId:-}][%X{operation:-}] %logger{36} - %m%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
